<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV PRO</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0b0f1a;
    color: #fff;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px;
    background: #111827;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.logo { font-weight: bold; font-size: 18px; }

.live {
    background: red;
    padding: 5px 10px;
    border-radius: 20px;
    font-size: 12px;
}

.container {
    padding: 15px;
    max-width: 500px;
    margin: auto;
}

.video-container {
    position: relative;
    width: 100%;
    height: 230px;
    border-radius: 15px;
    overflow: hidden;
    margin-bottom: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}

.video-container iframe {
    width: 100%;
    height: 100%;
    border: none;
}

.badge-live {
    position: absolute;
    top: 10px;
    left: 10px;
    background: red;
    padding: 5px 10px;
    font-size: 12px;
    border-radius: 20px;
}

/* LOADER */
.loader {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.hidden { display: none; }

.spinner {
    width: 45px;
    height: 45px;
    border: 5px solid #fff;
    border-top: 5px solid transparent;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

.btn {
    display: block;
    text-align: center;
    padding: 14px;
    margin-top: 12px;
    border-radius: 12px;
    color: #fff;
    text-decoration: none;
    font-weight: 600;
    background: #1f2937;
}

.btn-main { background: linear-gradient(180deg, #00ff87, #00c853); }
.btn-web { background: linear-gradient(180deg, #7b2cff, #4b00ff); }

.info-box {
    background: rgba(255,255,255,0.05);
    border-left: 4px solid #00c853;
    padding: 10px;
    border-radius: 8px;
    margin-top: 10px;
    font-size: 13px;
}
</style>
</head>

<body>

<div class="header">
    <div class="logo" id="appName">TV PRO</div>
    <div class="live">● EN VIVO</div>
</div>

<div class="container">

<div class="video-container">

    <div class="badge-live">EN VIVO</div>

    <div id="loader" class="loader hidden">
        <div class="spinner"></div>
        <p>Cargando...</p>
    </div>

    <iframe id="player"
        src="https://la14hd.com/vivo/canales.php?stream=dsports"
        allowfullscreen>
    </iframe>

</div>

<h2>⚽ MUNDIAL 2026</h2>

<a class="btn btn-main" onclick="cambiar('https://la14hd.com/vivo/canales.php?stream=dsports')">
SERVIDOR PRINCIPAL
</a>

<a class="btn btn-web" onclick="cambiar('https://teleamazonas-live.cdn.vustreams.com/live/b545dc57-91af-4f6b-bac7-8d9337166407/live.isml/b545dc57-91af-4f6b-bac7-8d9337166407.m3u8')">
SERVIDOR WEB
</a>

<div class="info-box">
⚠️ Sistema con bloqueo de anuncios activado
</div>

</div>

<script>
const player = document.getElementById("player");
const loader = document.getElementById("loader");

/* =========================
   🚀 ADBLOCK SIMULADO
========================= */

/* 1. BLOQUEO DE POPUPS */
window.open = function(url) {
    console.log("🚫 Popup bloqueado:", url);
    return null;
};

/* 2. BLOQUEO DE LINKS SOSPECHOSOS */
document.addEventListener("click", function(e) {
    let a = e.target.closest("a");
    if (!a) return;

    let url = a.href || "";

    let blocked = [
        "doubleclick",
        "ads",
        "adservice",
        "pop",
        "click",
        "banner"
    ];

    for (let word of blocked) {
        if (url.includes(word)) {
            e.preventDefault();
            alert("🚫 Anuncio bloqueado");
            return false;
        }
    }
});

/* =========================
   PLAYER CONTROL
========================= */

function showLoader() {
    loader.classList.remove("hidden");
}

function hideLoader() {
    loader.classList.add("hidden");
}

function cambiar(url) {
    showLoader();

    player.src = "about:blank";

    setTimeout(() => {
        player.src = url;

        setTimeout(() => {
            hideLoader();
        }, 5000);

    }, 500);
}

/* nombre app */
document.getElementById("appName").innerText = "IRAK VS BOLIVIA PRO";
</script>

</body>
</html>
